# ============================================================================
# Yuxi-Know 自动化部署配置文件
# ============================================================================

# ============================ 项目配置 ============================

PROJECT_NAME="Yuxi-Know"
PROJECT_DIR="/app/yuxi-know"

# Git 配置说明：
# 以下 Git 配置项请通过系统环境变量设置，不要在此文件中配置：
#
# GIT_REPO - Git 仓库地址（必需）
#   export GIT_REPO="https://github.com/Chenwx0/Yuxi-Know.git"
#   或 SSH 格式：
#   export GIT_REPO="git@github.com:Chenwx0/Yuxi-Know.git"
#
# GIT_BRANCH - Git 分支（必需）
#   export GIT_BRANCH="dev"
#
# Git 认证信息（私有仓库必需）：
#
# 方式1: Personal Access Token（推荐）
#   export GIT_AUTH_TOKEN="ghp_xxxxxxxxxxxxxxxxxxxx"
#
# 方式2: SSH 密钥
#   当 GIT_REPO 使用 SSH 格式时，依赖服务器 SSH 密钥配置
#
# 方式3: 用户名密码（不推荐，仅用于测试）
#   export GIT_USERNAME="your-username"
#   export GIT_PASSWORD="your-password"
#
# 对于 Windows 远程部署，在 windows-deploy.conf 中配置 GIT_REPO、GIT_BRANCH 和认证信息，
# 脚本会自动通过环境变量传递到远程服务器


# ============================ 数据卷配置 ============================

# 数据卷根目录（所有容器挂载的目录都基于此根目录）
DATA_ROOT="/app/data"
# 如果是生产环境，建议修改为持久目录，例如：
# DATA_ROOT="/data/yuxi-know"

# 实际数据目录（基于 DATA_ROOT）
CONFIG_DIR="${DATA_ROOT}/config"
SAVE_DIR="${DATA_ROOT}/saves"
MODEL_DIR="${DATA_ROOT}/models"
LOGS_DIR="${DATA_ROOT}/logs"

# 数据库数据目录（基于 DATA_ROOT）
POSTGRES_DATA_DIR="${DATA_ROOT}/postgres"
NEO4J_DATA_DIR="${DATA_ROOT}/neo4j"
MILVUS_DATA_DIR="${DATA_ROOT}/milvus"
PADDLEX_DATA_DIR="${DATA_ROOT}/paddlex"

# 数据目录结构定义（用于初始化检查和验证）
DATA_DIRECTORIES=(
    # 数据库数据目录
    "${POSTGRES_DATA_DIR}"
    "${NEO4J_DATA_DIR}"
    "${MILVUS_DATA_DIR}"
    "${PADDLEX_DATA_DIR}"

    # 应用数据目录
    "${SAVE_DIR}"
    "${MODEL_DIR}"

    # 配置和日志目录
    "${CONFIG_DIR}/env"
    "${LOGS_DIR}/docker"

    # Neo4j 子目录
    "${DATA_ROOT}/neo4j/data"
    "${DATA_ROOT}/neo4j/logs"

    # Milvus 子目录
    "${DATA_ROOT}/milvus/etcd"
    "${DATA_ROOT}/milvus/minio"
    "${DATA_ROOT}/milvus/minio_config"
    "${DATA_ROOT}/milvus/logs"
)

# ============================ 服务配置 ============================

COMPOSE_FILE="docker-compose.yml"
SERVICE_NAMES=("api" "web" "postgres" "neo4j" "milvus" "minio")

# ============================ 健康检查配置 ============================

HEALTH_CHECK_TIMEOUT=300  # 5分钟
HEALTH_CHECK_INTERVAL=10  # 10秒
HEALTH_CHECK_RETRIES=30   # 最大重试次数

# ============================ 备份配置 ============================

BACKUP_DIR="./backups"
BACKUP_RETENTION_DAYS=7
BACKUP_DATABASES=("postgres" "neo4j" "milvus")

# ============================ 日志配置 ============================

LOG_DIR="./logs/deploy"
LOG_LEVEL="INFO"

# ============================ 回滚配置 ============================

ROLLBACK_ENABLED=true
ROLLBACK_KEEP_COUNT=5

# ============================ 通知配置（可选）============================

NOTIFICATION_ENABLED=false
WEBHOOK_URL=""
EMAIL_TO=""

# ============================ 磁盘空间要求 ============================

REQUIRED_DISK_SPACE_GB=20  # 最小要求 10GB

# ============================ 网络配置 ============================

NETWORK_NAME="app-network"
