# ============================================================================
# Yuxi-Know 自动化部署配置文件
# ============================================================================

# ============================ 项目配置 ============================

PROJECT_NAME="Yuxi-Know"
PROJECT_DIR="/app/yuxi-know"
GIT_REPO="https://github.com/xerrors/Yuxi-Know.git"
GIT_BRANCH="main"

# ============================ 项目配置文件目录 ============================
CONFIG_DIR="${PROJECT_DIR}/config"

# ============================ 数据卷配置 ============================

# 数据卷根目录（所有容器挂载的目录都基于此根目录）
DATA_ROOT="/app/data"
# 如果是生产环境，建议修改为持久目录，例如：
# DATA_ROOT="/data/yuxi-know"

# 实际数据目录（基于 DATA_ROOT）
SAVES_DIR="${DATA_ROOT}/saves"
MODELS_DIR="${DATA_ROOT}/models"
LOGS_DIR="${DATA_ROOT}/logs"

# 数据库数据目录（基于 DATA_ROOT）
POSTGRES_DATA_DIR="${DATA_ROOT}/postgres"
NEO4J_DATA_DIR="${DATA_ROOT}/neo4j"
MILVUS_DATA_DIR="${DATA_ROOT}/milvus"
PADDLEX_DATA_DIR="${DATA_ROOT}/paddlex"

# 数据目录结构定义（用于初始化检查和验证）
DATA_DIRECTORIES=(
    # 数据库数据目录
    "${POSTGRES_DATA_DIR}"
    "${NEO4J_DATA_DIR}"
    "${MILVUS_DATA_DIR}"
    "${PADDLEX_DATA_DIR}"

    # 应用数据目录
    "${SAVES_DIR}"
    "${MODELS_DIR}"

    # 配置和日志目录
    "${CONFIG_DIR}/env"
    "${LOGS_DIR}/docker"

    # Neo4j 子目录
    "${DATA_ROOT}/neo4j/data"
    "${DATA_ROOT}/neo4j/logs"

    # Milvus 子目录
    "${DATA_ROOT}/milvus/etcd"
    "${DATA_ROOT}/milvus/minio"
    "${DATA_ROOT}/milvus/minio_config"
    "${DATA_ROOT}/milvus/logs"
)

# ============================ 服务配置 ============================

COMPOSE_FILE="docker-compose.yml"
SERVICE_NAMES=("api" "web" "postgres" "neo4j" "milvus" "minio")

# ============================ 健康检查配置 ============================

HEALTH_CHECK_TIMEOUT=300  # 5分钟
HEALTH_CHECK_INTERVAL=10  # 10秒
HEALTH_CHECK_RETRIES=30   # 最大重试次数

# ============================ 备份配置 ============================

BACKUP_DIR="./backups"
BACKUP_RETENTION_DAYS=7
BACKUP_DATABASES=("postgres" "neo4j" "milvus")

# ============================ 日志配置 ============================

LOG_DIR="./logs/deploy"
LOG_LEVEL="INFO"

# ============================ 回滚配置 ============================

ROLLBACK_ENABLED=true
ROLLBACK_KEEP_COUNT=5

# ============================ 通知配置（可选）============================

NOTIFICATION_ENABLED=false
WEBHOOK_URL=""
EMAIL_TO=""

# ============================ 磁盘空间要求 ============================

REQUIRED_DISK_SPACE_GB=20  # 最小要求 10GB

# ============================ 网络配置 ============================

NETWORK_NAME="app-network"
